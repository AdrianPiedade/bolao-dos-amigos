<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão da Família</title>
<style>
    :root {
        --primary-color: #1a5a32;
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
        --text-color: #333333;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
    }

    header {
        background-color: var(--primary-color);
        color: white;
        text-align: center;
        padding: 1rem 0;
    }

    .tabs {
        display: flex;
        justify-content: center;
        background-color: #123f22;
        overflow-x: auto;
    }

    .tab-btn {
        background-color: inherit;
        color: white;
        border: none;
        outline: none;
        cursor: pointer;
        padding: 14px 20px;
        font-size: 16px;
        transition: 0.3s;
        flex: 1;
        max-width: 200px;
        text-align: center;
    }

    .tab-btn:hover {
        background-color: #2e8b50;
    }

    .tab-btn.active {
        background-color: var(--bg-color);
        color: var(--primary-color);
        font-weight: bold;
    }

    .tab-content {
        display: none;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
    }

    .tab-content.active {
        display: block;
    }

    .card {
        background-color: var(--card-bg);
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        padding: 15px;
        margin-bottom: 15px;
    }

    .match {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .team {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        min-width: 80px;
    }

    .team img {
        width: 40px;
        height: auto;
        border-radius: 4px;
        margin-bottom: 5px;
    }

    .score {
        font-size: 24px;
        font-weight: bold;
        padding: 0 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .score-input {
        background-color: #eee;
        padding: 5px 15px;
        border-radius: 4px;
        font-weight: bold;
        min-width: 30px;
        text-align: center;
        border: 1px solid #ccc;
    }

    .group-title {
        font-size: 14px;
        color: #666;
        width: 100%;
        text-align: center;
        margin-bottom: 10px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background-color: var(--card-bg);
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border-radius: 8px;
        overflow: hidden;
    }

    th, td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }

    th {
        background-color: var(--primary-color);
        color: white;
    }

    .palpite-row {
        background-color: #f9f9f9;
        margin-top: 10px;
        padding: 10px;
        border-radius: 4px;
        font-size: 14px;
    }

    #loading {
        text-align: center;
        padding: 20px;
        font-size: 18px;
        font-weight: bold;
    }

    .player-selector {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 15px;
        margin-bottom: 15px;
    }

    .player-label {
        background-color: #e0e0e0;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        white-space: nowrap;
        font-size: 14px;
        user-select: none;
        transition: 0.2s;
    }

    .player-radio:checked + .player-label {
        background-color: var(--primary-color);
        color: white;
        font-weight: bold;
    }

    .player-radio {
        display: none;
    }

    .user-guess {
        width: 100%;
        text-align: center;
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px dashed #ccc;
        font-size: 14px;
        color: #555;
    }

    .user-guess strong {
        color: var(--primary-color);
        font-size: 16px;
    }

    .no-guess {
        color: #999;
        font-style: italic;
    }

    @media (max-width: 600px) {
        .tab-btn {
            font-size: 14px;
            padding: 10px;
        }
        
        .score {
            font-size: 18px;
        }
    }
</style>
</head>
<body>

<header>
    <h1>🏆 Bolão dos Amigos</h1>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="abrirAba('ranking')" id="btn-ranking" disabled>Ranking</button>
    <button class="tab-btn" onclick="abrirAba('palpites')" id="btn-palpites" disabled>Palpites</button>
    <button class="tab-btn" onclick="abrirAba('resultados')" id="btn-resultados" disabled>Resultados</button>
</div>

<div id="loading">Carregando dados oficiais e palpites em tempo real...</div>

<div id="ranking" class="tab-content">
    <h2>Classificação Atual</h2>
    <table>
        <thead>
            <tr>
                <th>Posição</th>
                <th>Jogador</th>
                <th>Pontos</th>
            </tr>
        </thead>
        <tbody id="ranking-body">
        </tbody>
    </table>
</div>

<div id="palpites" class="tab-content">
    <h2>Palpites dos Jogadores</h2>
    <div id="palpites-container"></div>
</div>

<div id="resultados" class="tab-content">
    <h2>Resultados Oficiais</h2>
    <div id="filtro-jogadores" class="player-selector"></div>
    <div id="resultados-container"></div>
</div>

<script>
    let jogadoresOficiais = [];
    let times = {};
    let jogos = [];
    let palpites = [];
    
    const API_KEY = "INSIRA_AQUI_SUA_CHAVE_DO_FOOTBALL_DATA";

    async function carregarDados() {
        try {
            const respJogadores = await fetch('jogadores.json');
            jogadoresOficiais = await respJogadores.json();

            const respTimes = await fetch('times.json');
            times = await respTimes.json();

            const respPalpites = await fetch('palpites.json');
            palpites = await respPalpites.json();

            const urlAlvo = 'https://api.football-data.org/v4/competitions/WC/matches';
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(urlAlvo);

            const responseAPI = await fetch(proxyUrl, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const dadosAPI = await responseAPI.json();

            const partidasCopa = dadosAPI.matches.filter(m => m.stage === "GROUP_STAGE");
            
            partidasCopa.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

            jogos = partidasCopa.map((m, index) => {
                return {
                    id: index + 1,
                    apiMatchId: m.id,
                    data: new Date(m.utcDate).toLocaleDateString('pt-BR'),
                    grupo: `Grupo ${m.group ? m.group.replace('GROUP_', '') : '-'}`,
                    timeA: m.homeTeam.tla || m.homeTeam.name,
                    timeB: m.awayTeam.tla || m.awayTeam.name,
                    nomeTimeA: m.homeTeam.name,
                    nomeTimeB: m.awayTeam.name,
                    golsA: m.score.fullTime.home !== null ? m.score.fullTime.home : null,
                    golsB: m.score.fullTime.away !== null ? m.score.fullTime.away : null
                };
            });

            document.getElementById('loading').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.disabled = false);
            
            inicializar();
            abrirAba('ranking');

        } catch (error) {
            document.getElementById('loading').innerHTML = 'Erro ao sincronizar com a API da FIFA ou carregar arquivos.';
        }
    }

    function obterChaveTime(identificador) {
        if (!identificador) return null;
        
        const correcoesAPI = {
            "URY": "URU",
            "Uruguay": "URU",
            "ZAF": "RSA",
            "South Africa": "RSA",
            "CZE": "CZE",
            "Czechia": "CZE"
        };
        
        if (correcoesAPI[identificador]) return correcoesAPI[identificador];
        if (times[identificador]) return identificador;
        
        for (let chave in times) {
            if (times[chave].nome.toLowerCase() === identificador.toLowerCase()) return chave;
            if (times[chave].sigla.toLowerCase() === identificador.toLowerCase()) return chave;
        }
        return identificador;
    }

    function abrirAba(abaId) {
        document.querySelectorAll('.tab-content').forEach(aba => aba.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(abaId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function obterBandeira(sigla) {
        if (sigla) return `https://flagcdn.com/w40/${sigla.toLowerCase()}.png`;
        return `https://images.tcdn.com.br/img/img_prod/adicionar_imagem_placeholder.png`;
    }

    function buscarSiglaPorTLA(tla) {
        const chave = obterChaveTime(tla);
        return times[chave] ? times[chave].sigla : null;
    }

    function buscarNomePorTLA(tla, nomePadrao) {
        const chave = obterChaveTime(tla);
        return times[chave] ? times[chave].nome : nomePadrao;
    }

    function calcularPontos(palpiteA, palpiteB, realA, realB) {
        if (realA === null || realB === null) return 0;
        
        if (palpiteA === realA && palpiteB === realB) return 6;

        let pontos = 0;
        const resPalpite = Math.sign(palpiteA - palpiteB);
        const resReal = Math.sign(realA - realB);

        if (resPalpite === resReal) pontos += 3;
        if (palpiteA === realA) pontos += 1;
        if (palpiteB === realB) pontos += 1;

        return pontos;
    }

    function renderizarFiltroJogadores() {
        const container = document.getElementById('filtro-jogadores');
        let html = `
            <input type="radio" id="filter-geral" name="player-filter" value="" class="player-radio" checked onchange="atualizarFiltroResultados()">
            <label for="filter-geral" class="player-label">Geral</label>
        `;
        
        jogadoresOficiais.forEach(jogador => {
            html += `
                <input type="radio" id="filter-${jogador}" name="player-filter" value="${jogador}" class="player-radio" onchange="atualizarFiltroResultados()">
                <label for="filter-${jogador}" class="player-label">${jogador}</label>
            `;
        });
        
        container.innerHTML = html;
    }

    function atualizarFiltroResultados() {
        const selecionado = document.querySelector('input[name="player-filter"]:checked').value;
        renderizarResultados(selecionado);
    }

    function renderizarResultados(jogadorSelecionado = '') {
        const container = document.getElementById('resultados-container');
        container.innerHTML = '';

        jogos.forEach(jogo => {
            const chaveA = obterChaveTime(jogo.timeA);
            const chaveB = obterChaveTime(jogo.timeB);
            
            const siglaA = buscarSiglaPorTLA(jogo.timeA);
            const siglaB = buscarSiglaPorTLA(jogo.timeB);
            const nomeA = buscarNomePorTLA(jogo.timeA, jogo.nomeTimeA);
            const nomeB = buscarNomePorTLA(jogo.timeB, jogo.nomeTimeB);

            const placarA = jogo.golsA !== null ? jogo.golsA : '-';
            const placarB = jogo.golsB !== null ? jogo.golsB : '-';

            let htmlPalpite = '';
            
            if (jogadorSelecionado !== '') {
                const palpite = palpites.find(p => 
                    p.jogador === jogadorSelecionado && 
                    ((p.timeA === chaveA && p.timeB === chaveB) || (p.timeA === chaveB && p.timeB === chaveA))
                );
                
                if (palpite) {
                    let pGolsHome, pGolsAway;
                    if (palpite.timeA === chaveA) {
                        pGolsHome = palpite.golsA;
                        pGolsAway = palpite.golsB;
                    } else {
                        pGolsHome = palpite.golsB;
                        pGolsAway = palpite.golsA;
                    }

                    let infoPontos = '';
                    if (jogo.golsA !== null && jogo.golsB !== null) {
                        const pts = calcularPontos(pGolsHome, pGolsAway, jogo.golsA, jogo.golsB);
                        infoPontos = ` | <strong>+${pts} pts</strong>`;
                    }
                    htmlPalpite = `
                        <div class="user-guess">
                            Palpite: ${pGolsHome} x ${pGolsAway}${infoPontos}
                        </div>
                    `;
                } else {
                    htmlPalpite = `
                        <div class="user-guess no-guess">
                            Sem palpite registrado
                        </div>
                    `;
                }
            }

            const card = document.createElement('div');
            card.className = 'card match';
            card.innerHTML = `
                <div class="group-title">${jogo.data} | ${jogo.grupo}</div>
                <div class="team">
                    <img src="${obterBandeira(siglaA)}" alt="${nomeA}">
                    <span>${nomeA}</span>
                </div>
                <div class="score">
                    <span class="score-input">${placarA}</span> x <span class="score-input">${placarB}</span>
                </div>
                <div class="team">
                    <img src="${obterBandeira(siglaB)}" alt="${nomeB}">
                    <span>${nomeB}</span>
                </div>
                ${htmlPalpite}
            `;
            container.appendChild(card);
        });
    }

    function renderizarPalpites() {
        const container = document.getElementById('palpites-container');
        container.innerHTML = '';

        jogos.forEach(jogo => {
            const chaveA = obterChaveTime(jogo.timeA);
            const chaveB = obterChaveTime(jogo.timeB);
            const nomeA = buscarNomePorTLA(jogo.timeA, jogo.nomeTimeA);
            const nomeB = buscarNomePorTLA(jogo.timeB, jogo.nomeTimeB);
            
            const palpitesDoJogo = palpites.filter(p => 
                (p.timeA === chaveA && p.timeB === chaveB) || 
                (p.timeA === chaveB && p.timeB === chaveA)
            );

            if (palpitesDoJogo.length === 0) return;

            let htmlPalpites = '';
            palpitesDoJogo.forEach(p => {
                let pGolsHome, pGolsAway;
                if (p.timeA === chaveA) {
                    pGolsHome = p.golsA;
                    pGolsAway = p.golsB;
                } else {
                    pGolsHome = p.golsB;
                    pGolsAway = p.golsA;
                }

                const pontosGanhos = calcularPontos(pGolsHome, pGolsAway, jogo.golsA, jogo.golsB);
                const txtPontos = jogo.golsA !== null ? ` (+${pontosGanhos} pts)` : '';
                htmlPalpites += `
                    <div class="palpite-row">
                        <strong>${p.jogador}:</strong> ${pGolsHome} x ${pGolsAway} ${txtPontos}
                    </div>
                `;
            });

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="group-title">${jogo.data} | ${jogo.grupo} | ${nomeA} vs ${nomeB}</div>
                ${htmlPalpites}
            `;
            container.appendChild(card);
        });
    }

    function renderizarRanking() {
        const pontosPorJogador = {};

        jogadoresOficiais.forEach(jogador => {
            pontosPorJogador[jogador] = 0;
        });

        palpites.forEach(p => {
            const jogo = jogos.find(j => {
                const cA = obterChaveTime(j.timeA);
                const cB = obterChaveTime(j.timeB);
                return (p.timeA === cA && p.timeB === cB) || (p.timeA === cB && p.timeB === cA);
            });

            if (jogo && jogo.golsA !== null && jogo.golsB !== null) {
                let pGolsHome, pGolsAway;
                const cA = obterChaveTime(jogo.timeA);
                if (p.timeA === cA) {
                    pGolsHome = p.golsA;
                    pGolsAway = p.golsB;
                } else {
                    pGolsHome = p.golsB;
                    pGolsAway = p.golsA;
                }
                
                if (pontosPorJogador[p.jogador] !== undefined) {
                    pontosPorJogador[p.jogador] += calcularPontos(pGolsHome, pGolsAway, jogo.golsA, jogo.golsB);
                }
            }
        });

        const rankingArray = Object.keys(pontosPorJogador).map(jogador => {
            return { jogador: jogador, pontos: pontosPorJogador[jogador] };
        });

        rankingArray.sort((a, b) => b.pontos - a.pontos);

        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = '';

        rankingArray.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}º</td>
                <td><strong>${item.jogador}</strong></td>
                <td>${item.pontos}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function inicializar() {
        renderizarFiltroJogadores();
        renderizarResultados();
        renderizarPalpites();
        renderizarRanking();
    }

    window.onload = carregarDados;
</script>
</body>
</html>
